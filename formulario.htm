<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <header>
      <h1>Formulario</h1>
    </header>
    <nav>
      <a href="index.htm">Inicio</a>
      <a href="/formulario.htm">Formulario</a>
    </nav>
    <main>
      <form action="/" method="get">
        <section id="Login">
          <label>
            Nombre
            <input type="text" name="nombre" />
          </label>
          <label>
            correo
            <input type="email" name="correo" />
          </label>
          <label>
            contraseña
            <input type="password" name="password" />
          </label>
        </section>

        <section id="Género">
          <h2>Género</h2>
          <label>
            Hombre
            <input type="radio" name="genero" id="male" value="male" />
          </label>
          <label>
            Mujer
            <input type="radio" name="genero" id="female" value="female" />
          </label>
        </section>

        <section id="Hobbies">
          <input type="checkbox" name="hobby" value="leer" />
          leer
          <input type="checkbox" name="hobby" value="Dormir" />
          Dormir
        </section>

        <section id="Botones">
          <button type="submit">Enviar</button>
          <button type="reset">Limpiar</button>
        </section>
      </form>
    </main>
  </body>
</html>
